name: Build release zip

on:
  push:
    tags:
      # Matches version tags like 1.2.1.4, 1.2.1.4-01, v1.2.1.4, v1.2.1.4-01
      - '[0-9]+.[0-9]+.[0-9]+*'
      - 'v[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: write

jobs:
  build:
    name: Build release zip
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Determine version
      id: version
      run: |
        RAW="${GITHUB_REF_NAME}"
        VERSION="${RAW#v}"        # strip leading "v"
        VERSION="${VERSION%-*}"   # strip "-01" build suffix
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"

    - name: Bundle repo into churchtools-suite folder
      run: |
        VERSION="${{ steps.version.outputs.version }}"
        STAGING="$RUNNER_TEMP/staging/churchtools-suite"
        mkdir -p "$STAGING"
        # Copy the complete repo into the churchtools-suite/ folder, excluding VCS internals
        rsync -a --exclude='.git' ./ "$STAGING/"
        ( cd "$RUNNER_TEMP/staging" && zip -r "$GITHUB_WORKSPACE/churchtools-suite-${VERSION}.zip" churchtools-suite )

    - name: Create release and attach zip
      uses: softprops/action-gh-release@v2
      with:
        name: ${{ steps.version.outputs.version }}
        files: churchtools-suite-${{ steps.version.outputs.version }}.zip
